name: IsoBrowse Sandbox Test

on: [push]

jobs:
  test-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust and Wasm Target
        run: |
          rustup target add wasm32-wasip1

      - name: Build Wasm
        run: cargo build --target wasm32-wasip1

      - name: Setup Docker Wasm Support
        run: |
          # GitHub runner'larında Docker zaten var, Wasm desteğini hızlıca ekliyoruz
          sudo apt-get update
          sudo apt-get install -y wasmtime

      - name: Run RAM Monster Test (With 128MB Limit)
        run: |
          # Wasmtime ile limiti simüle ediyoruz (Docker Terminal hatası burada yaşanmaz)
          wasmtime run --wasm-max-mem 134217728 target/wasm32-wasip1/debug/isobrowse_test.wasm
